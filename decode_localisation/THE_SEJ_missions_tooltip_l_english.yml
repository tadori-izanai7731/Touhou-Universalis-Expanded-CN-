 THE_SEJ_magic_charge:0 "魔力充能"
 THE_SEJ_magic_charge_desc:0 "§Y当前生效的年度来源§!：[Root.GetTHESEJMagicChargePeaceSource][Root.GetTHESEJMagicChargeUnrestSource][Root.GetTHESEJMagicChargeRageSource][Root.GetTHESEJMagicChargeStrictSource][Root.GetTHESEJMagicChargeDownfallSource][Root.GetTHESEJMagicChargeFaithSource][Root.GetTHESEJMagicChargeDecaySource]\n\n界面下方显示所有来源相加后的§Y每月净变化§!。即时获得或损失不计入月度来源；完整规则请查看可重复点击的§Y魔力充能说明§!决议。"
 monthly_THE_SEJ_magic_charge:0 "每月魔力充能"
 THE_SEJ_magic_charge_gain_modifier:0 "魔力充能获取修正"
 THE_SEJ_magic_charge_explain_decision_title:0 "查看魔力充能说明"
 THE_SEJ_magic_charge_explain_decision_desc:0 "打开完整机制说明。魔力条的悬停提示会实时列出当前生效的年度增减来源；该决议可以重复执行。"
 THE_SEJ_rework_events.15.t:0 "魔力充能与叛乱度机制说明"
 THE_SEJ_rework_events.15.d:0 "§G增加来源§!\n全局叛乱度为正时，每§Y1§!点使魔力充能每年§G+1§!，最高§G+5§!。§Y下克上阶级特权狂暴作战模式§!每年§G+1§!；§Y天邪鬼掀起下克上§!每年§G+1§!；§Y完成任务信仰取代侵蚀魔力§!每年§G+2§!。每将一个省份传播为反逆思潮，立即获得§G+3§!。\n§R减少来源§!\n和平时期每年§R-5§!。全局叛乱度为负时，每§Y1§!点使魔力充能每年§R-1§!，最低§R-5§!。§Y下克上阶级特权严格卫队征募§!每年§R-1§!。魔力自身还会随当前数值线性衰减：§Y0§!点时不衰减，§Y100§!点时每年§R-3§!。战争失败时立即失去§R50§!。\n§Y翻转奇观§!会提高全局叛乱度，再间接改变魔力增长。察伊琴奇每一级§R+1§!全局叛乱度，并在达到三级时使魔力充能每月§G+0.1§!（每年§G+1.2§!）；其他翻转奇观第一级不增加，第二级§R+0.5§!、第三级§R+1§!全局叛乱度。所有翻转奇观达到三级时额外获得§G+1§!正统信仰容忍。"
 THE_SEJ_rework_events.15.a:0 "确认。"
