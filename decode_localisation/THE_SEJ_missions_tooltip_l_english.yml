 THE_SEJ_p1_fifty_nine_theses_disaster:0 "五十九条论纲"
 THE_SEJ_p1_fifty_nine_theses_disaster_desc:0 "领域内日渐滋生的动荡情绪，终于在祭历院爆发：一位教士和信奉玛雅宗教的前教士团体联合，在祭历院的外墙公开宣称正邪也是强者的一份子，是窃取了玛雅宗教信仰的异端，并要求将正邪驱逐出玛雅信仰体系。他们的行为正在不断造成国内思想的动荡，因此对其的处理就不能仅限军事手段，还要有思想辩论。"
 THE_SEJ_p1_bloodthirsty_guard_disaster:0 "失控的嗜血卫队"
 THE_SEJ_p1_bloodthirsty_guard_disaster_desc:0 "卫队士兵在魔力持续的侵蚀之下已经彻底丧失理智，开始了无差别的袭击。要想解决卫队的狂暴症状就需要强制约束纪律、剔除无可救药的士兵以及用稳定的信仰之力来取代源自万宝槌的侵蚀性魔力。\n\n§R警告：卫队叛军在攻陷省份时会将其焚略。§!"
 THE_SEJ_p1_disaster_events.8.title:0 "卫队失控"
 THE_SEJ_p1_disaster_events.8.desc:0 "又一批卫队成员在魔力的持续侵蚀之下走向失控，现在他们已经开始了无差别的攻击。我们必须用强制手段才能重新让他们冷静下来"
 THE_SEJ_p1_disaster_events.8.a:0 "明明只是些杂鱼"
 THE_SEJ_p1_disasters_start_tt:0 "完成§Y诸邦和解大祭§!后，§Y五十九条论纲§!与§Y失控的嗜血卫队§!灾难将开始积累进度。"
