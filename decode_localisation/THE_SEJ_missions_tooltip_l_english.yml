 THE_SEJ_rework_events.12.t:0 "逆转奇琴伊察"
 THE_SEJ_rework_events.12.d:0 "大祭那天，沿岸商人、地方祭司、红黑卫队和各城邦的使者挤满了奇琴伊察。有人带来可可与玉石，有人带来盟约和贡礼，也有人只是想亲眼看看，那位从天上掉下来的神使究竟还能做出什么。\n\n正邪站在石阶顶端。井市、道路、粮仓、祭历院和卫队已经证明她能够治理这里，但客气的承认还不够。她要这些城邦记住，不加入下克上，就只有被统治的命运。\n\n祭场积攒的信仰顺着箭头旗、祭文和反则道具涌来。为了让最后一点迟疑也安静下来，正邪放出了远超以往的侵蚀魔力。\n\n石阶开始震动。投在地上的影子先翻了过去，紧接着是祭坛、阶梯与整座金字塔。惊呼声尚未落下，奇琴伊察已经在众目睽睽之下逆转着飞向天空。\n\n正邪踩着倒悬的石阶，满意地看了看自己的新住所。\n\n至此，正邪的神明身份再也无法质疑，使者们依次献上盟约。没有攻城，也没有交战，在场的诸邦使者已经屈服于察伊琴奇的新主人。\n\n只是祭典散去以后，魔力仍在涌动，诸邦居民的眼中充斥着躁动与不安\n\n正邪没有在意。今天显然是她赢了。"
 THE_SEJ_rework_events.12.a:0 "无敌的天邪鬼大人终于有了自己的据点"
 THE_SEJ_p1_item_religious_challenge_title:0 "祭历院封存"
 THE_SEJ_p1_item_religious_challenge_desc:0 "宗教解释权首先被反则道具搅乱。祭历院必须重新收束仪式、圣物和奇琴伊察的信仰中心，让倒过来的神迹不再把每个祭司都变成新的麻烦。"
 THE_SEJ_p1_item_rampage_bound_title:0 "道具责任制"
 THE_SEJ_p1_item_rampage_bound_desc:0 "宗教、政治与军事三条子挑战都已被压回制度之内。反则道具仍然危险，但至少现在，每一次使用都能找到保管者、解释者和负责收拾局面的人。"
 THE_SEJ_p1_revolution_declaration_revolution_tt:0 "启用§Y下克上革命§!机制：§Y正邪§!将成为§Y下克上革命目标§!，首都成为§Y下克上革命中心§!，并解锁§Y输出下克上§!战争借口和§Y革命卫队训练§!决议。"
 THE_SEJ_p1_expansion_m2_title:0 "蛇王之林"
 THE_SEJ_p1_expansion_m2_desc:0 "越过尤卡坦内陆后，南方的森林开始变得沉重。道路被树根抬起，废弃的石阶陷进潮湿的泥土，曾经属于王权的声音被鸟鸣与虫声盖住。\n\n卡拉克穆尔的阴影就隐藏在这片雨林之中。它不像沿海城邦那样依赖港口，也不像后来的湖上帝国那样把贡赋送入中心。它的力量来自森林深处的联盟、威慑与漫长记忆。\n\n压服这片雨林，并不是简单向南推进一步。那意味着正邪第一次真正触碰到玛雅低地古老权力的根系。"
 THE_SEJ_p1_expansion_m3_title:0 "雨林王座"
 THE_SEJ_p1_expansion_m3_desc:0 "蒂卡尔不是海岸城，也不是边境集市。它是雨林深处的王座。\n\n高耸的神庙从树冠之间刺出，广场、宫殿、坡道与石碑共同组成一座曾经支配低地玛雅世界的权力舞台。在这里，王权并不表现为连续疆域，而表现为仪式、婚姻、战争与碑铭交织出的影响网络。\n\n当正邪控制佩滕，她得到的不只是雨林中的一座旧城。她得到的是一整个玛雅内陆世界承认过的中心。"
 THE_SEJ_p1_expansion_m4_title:0 "王朝之梯"
 THE_SEJ_p1_expansion_m4_desc:0 "科潘位于玛雅世界的东南边缘。这里远离尤卡坦沿岸，却保存着另一种令人难以忽视的权力形式：碑铭、祭坛、球场，以及被刻进石阶的王朝记忆。\n\n象形文字阶梯像一条通往过去的道路，每一级都不是普通石块，而是曾经的名字、日期与统治合法性。这里的人用石头记录时间，也用时间巩固王权。\n\n整合科潘，意味着玛雅世界从沿岸到雨林、从北方到东南的旧秩序，都被纳入察伊琴奇的新地图之中。"
 THE_SEJ_p1_expansion_m5_title:0 "山上圣城"
 THE_SEJ_p1_expansion_m5_desc:0 "从玛雅世界继续向西，地形开始抬升。雨林让位于山地，城邦之间的道路不再只是穿过密林，而要越过高原、峡谷与干燥坡地。\n\n蒙特阿尔班像是被从山体上切出来的圣城。台地、广场、金字塔和人工土丘与山势结合在一起，使这座城市看起来并非建在山上，而是从山中被雕刻出来。\n\n进入这里，正邪也就离开了单纯的玛雅内陆。前方已经是墨西哥高原，是另一个以战争、贡赋和城邦联盟构成的世界。"
 THE_SEJ_p1_expansion_m6_title:0 "湖上王座"
 THE_SEJ_p1_expansion_m6_desc:0 "墨西哥盆地的湖面在清晨被雾气覆盖，特诺奇蒂特兰像一座从水中升起的城市。堤道连接岛屿与陆地，贡赋、商队、战俘与祭祀共同流入城市中心。\n\n阿兹特克不只是一个敌国。它是一套已经运转数代的世界模型：战争获取俘虏与贡赋，贡赋维持城市与神庙，神庙再为战争赋予意义。湖上的王座并不只坐落在水中，它坐落在周边诸邦持续输送而来的资源之上。\n\n征服阿兹特克，意味着正邪不只是击败了一个强敌。她把墨西哥盆地最完整、最自洽的一套秩序，整套翻倒在地。"
 THE_SEJ_p1_expansion_m7_title:0 "众神遗城"
 THE_SEJ_p1_expansion_m7_desc:0 "阿兹特克的阴影之后，是更古老的阴影。\n\n特奥蒂瓦坎并非阿兹特克人建造，却被后来的文明视为“众神诞生之地”。太阳金字塔、月亮金字塔与羽蛇神庙沿着宏大的城市轴线展开，仿佛整座城市不是自然成长出来的，而是一件被提前设计好的仪式工具。\n\n它的建造者已经沉默，名字也被时间剥去。但城市本身仍像一个空壳系统，继续影响着后来所有进入墨西哥盆地的人。"
 THE_SEJ_p1_expansion_south7_title:0 "太阳门前"
 THE_SEJ_p1_expansion_south7_desc:0 "在库斯科之外，安第斯高原上还残留着更古老的记忆。\n\n蒂瓦纳库靠近的的喀喀湖，巨石建筑、仪式中心和太阳门的传说使它看起来不像普通废墟，而像一个前印加世界仍未完全沉默的入口。这里的石头没有解释自己，却让后来的帝国不得不承认：在库斯科之前，山上已经有人试图为世界排列秩序。\n\n控制蒂瓦纳库，意味着正邪把安第斯的过去也一起纳入掌心。连已经倒下的旧神国，也要在她的新秩序下重新站队。"
 THE_SEJ_p1_expansion_f1_title:0 "远方道路"
 THE_SEJ_p1_expansion_f1_desc:0 "从察伊琴奇出发的道路已经越过玛雅雨林与墨西哥高原，抵达更远的大陆边缘。\n\n向北，卡霍基亚的土丘网络证明没有王座也能形成庞大秩序；向南，库斯科的山地中心证明帝国可以沿着海拔重新组织世界。无论正邪选择哪一条道路，她都已经不再只是尤卡坦半岛上的异变统治者。\n\n远方开始有了道路，而道路的尽头，仍然可以被翻转。"
 THE_SEJ_p1_expansion_lost_items_requirement_tt:0 "控制§Y休§!，或同时控制§Y克佩奇§!与§Y阿卡努尔§!。"
 THE_SEJ_p1_expansion_flip_colonial_symbol_requirement_tt:0 "控制§Y库斯科§!，并在§Y卡哈马卡§!、§Y基多§!、§Y蒂亚瓦纳科§!中控制至少两个。"
 THE_SEJ_p1_expansion_f1_requirement_tt:0 "完成§Y无王之城：进入卡霍基亚网络§!或§Y四方之心：征服库斯科§!。"
 THE_SEJ_p1_expansion_ultimate_reversal_requirement_tt:0 "完成§Y翻转特诺奇蒂特兰§!、§Y向着沙漠前进§!和§Y直面大地撼动者§!。"
