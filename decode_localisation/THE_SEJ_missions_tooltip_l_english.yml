### IDEA
 THE_SEJ_ideas: "反逆理念"
 THE_SEJ_ideas_start: "反逆传统"
 THE_SEJ_ideas_bonus: "反逆野心"
 THE_SEJ_ideas_1: "弱者探险家"
 THE_SEJ_ideas_1_desc: "缺乏美洲地图的正邪决心逆反传统，雇佣那些弱者而非贵族成为探险家，为扩张与行军提供指导"
 THE_SEJ_ideas_2: "大规模训练"
 THE_SEJ_ideas_2_desc: "拥有严格训练与钢铁纪律的弱者便足以统治强者——《下克上宣言》"
 THE_SEJ_ideas_3: "下克上之火"
 THE_SEJ_ideas_3_desc: "每一位弱者都有责任将下克上之火传遍世界的每一个角落——《下克上宣言》"
 THE_SEJ_ideas_4: "弱者们，团结起来"
 THE_SEJ_ideas_4_desc: "团结一致，携手共进，为了下克上的信仰而战——《下克上宣言》"
 THE_SEJ_ideas_5: "下克上裁判所"
 THE_SEJ_ideas_5_desc: "如果谁不能接受下克上的信仰，谁就是要被统治的强者"
 THE_SEJ_ideas_6: "这是一场革命"
 THE_SEJ_ideas_6_desc: "弱者们不屑于妥协，只会坚定地向全世界输出下克上的信仰——《下克上宣言》"
 THE_SEJ_ideas_7: "驱逐强者"
 THE_SEJ_ideas_7_desc: "作为被统治者的强者们，应当在新世界为弱者的事业做出贡献以偿还罪孽"
### IDEA_END

### GOVERNMENT
 THE_SEJ_revolutionary_seija: "下克上革命社会"
 THE_SEJ_revolutionary_seija_desc: "整个弱者社会团结在正邪周围，为了下克上的理念而奋斗"
 THE_SEJ_revolutionary_guard: "掌控翻转的力量"
 THE_SEJ_revolutionary_guard_desc: "革命卫队是强大的军事力量，掌控并强化这种力量是宣传反抗思想必要的基础"
 THE_SEJ_expand_seija_paradise_reform: "扩张弱者乐园"
 THE_SEJ_expand_seija_paradise_reform_desc: "一个看起来像是弱者乐园的事物比真正的弱者乐园更有用，在不断的扩张中，曾经的弱者才能享受翻转的乐趣。"
 mechanic_THE_SEJ_converte_province_add_estate_loyalty_custom_attribute_yes: "省份转变为主流文化提高所有阶层§G5%§!忠诚度"
 mechanic_THE_SEJ_converte_province_add_reform_progress_custom_attribute_yes: "省份转变为主流文化获得§G2§!改革进度"
 THE_SEJ_revolutionary_guard_militarized_society: "反逆卫队军事化"
 monthly_THE_SEJ_revolutionary_guard_militarized_society: "月度反逆卫队军事化"
 ability_THE_SEJ_revolutionary_guard_militarization_mechanic: "反逆卫队军事化"
 THE_SEJ_revolutionary_guard_boost_militarization: "卫队反抗战争宣传"
 THE_SEJ_revolutionary_guard_boost_militarization_desc: "革命卫队成员也是我们宣传反抗思想的重要力量，卫队在全国的宣传可以极大提升我们的军事力量"

 THE_SEJ_RULER: "天邪鬼"
