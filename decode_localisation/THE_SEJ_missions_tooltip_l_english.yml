 THE_SEJ_p0_reverse_chichen_itza_preview_tt:0 "§G事件前瞻§!\n触发事件§Y逆转奇琴伊察§!：\n将§Y奇琴伊察§!翻转为一级§Y察伊琴奇§!，并将§Y索图塔§!的文化改为§Y妖怪§!。察伊琴奇仅在其所在省份为§Y妖怪文化§!且信仰§Y反逆思潮§!时生效。\n一级政府改革切换为§Y反逆邦联§!，政府等级提升为§Y帝国§!。\n移除§Y不成熟的革命卫队§!修正，以及§Y混乱的社会§!带来的本地最低自治度惩罚；并移除§Y度量衡的统一§!、§Y神力展示§!、§Y下克上大市§!和§Y吸纳旧贵族支持者§!提供的对应抵消效果。\n直接继承反逆邦联的玛雅宗教附庸国。\n继承所有对反逆邦联好感度达到§Y100§!的独立玛雅宗教国家。\n好感度不足§Y100§!的独立玛雅宗教国家将以§Y圣战§!为借口向反逆邦联宣战；其他国家的玛雅宗教附庸国将随宗主国参战。"
