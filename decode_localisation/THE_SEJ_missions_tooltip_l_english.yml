 # ---- migrated from zzzz_THE_SEJ_downfall_revolution_l_english.yml ----
 THE_SEJ_proclaim_downfall_revolution_title:0 "宣布下克上革命目标"
 THE_SEJ_proclaim_downfall_revolution_desc:0 "正邪不需要等待旧世界的革命名义，也不需要被任何帝国或共和国的结局命名。下克上会从奇琴伊察开始，以自己的中心、自己的卫队和主动发起的战争向旧秩序宣战。"
 THE_SEJ_proclaim_downfall_revolution_tt:0 "§Y正邪§!将成为§Y下克上革命目标§!。\n首都将成为§Y下克上革命中心§!。\n解锁§Y输出下克上§!战争借口。\n解锁原版风格的§Y革命卫队训练§!决议。"
 THE_SEJ_downfall_revolution_status_title:0 "查看下克上革命"
 THE_SEJ_downfall_revolution_status_desc:0 "查看下克上革命说明，并高亮首都的下克上革命中心。"
 THE_SEJ_downfall_revolution_status_tt:0 "§Y下克上革命特色机制：§!\n- §Y下克上革命§!在完成§Y下克上宣言§!后启用；§Y魔力充能§!则在完成§Y诸邦和解大祭§!后解锁。\n- 原版革命热情提供的行政效率等主要数值奖励已迁移到§Y魔力充能§!中。\n- 下克上革命不会自动向国内外省份传播；§Y反逆思潮§!的宗教传播继续由传教中心与传教士承担。\n- 与正邪直接接壤的国家会因§Y下克上革命目标§!的威胁而对正邪产生§R-50§!好感；停止接壤后，这份敌意将立即消失。\n- 和平条款不包含原版§Y传播革命§!与§Y摧毁革命§!条款；战争借口和战争目标数值按原版传播革命设计。"
