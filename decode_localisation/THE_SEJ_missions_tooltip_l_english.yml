 THE_SEJ_p0_chaotic_society_reform:0 "混乱的社会"
 THE_SEJ_p0_chaotic_society_reform_desc:0 "头上长角的奇怪生物的到来，和大祭司与统治者的忽然趋势让整个国家陷入了混乱。但混乱同时也是天邪鬼的机会，她必须尝试在混乱中夺取控制权，并且证明自己的能力。"
 THE_SEJ_rebellious_confederation_reform:0 "反逆邦联"
 THE_SEJ_rebellious_confederation_reform_desc:0 "反逆邦联是正邪在美洲建立起的极富天邪鬼特色的行政架构，她向弱者许诺以下克上的未来，并且在强与弱的时刻翻转中实现平衡。同时每个被纳入管辖范围的人逆反心理都会被大大增强，以至于变得极为暴躁。但只要他们的逆反心理能被反逆思潮所规训，这就会成为正邪魔力的来源。"
