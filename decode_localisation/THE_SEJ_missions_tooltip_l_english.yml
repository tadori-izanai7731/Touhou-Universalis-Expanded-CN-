 THE_SEJ_expand_seija_paradise_reform_requirement_tt:0 "完成任务§Y正邪为弱者的服务而喜悦§!。"
 THE_SEJ_arrow_banner_frontier_modifier:0 "箭头旗拓荒区"
 desc_THE_SEJ_arrow_banner_frontier_modifier:0 "箭头旗下的边地聚落、逃亡者、盟众代表和传令队开始沿无主之地扩散。这不是旧世界式殖民，而是反逆邦联把边地纳入共同防卫与议事秩序的方式。"
 THE_SEJ_positive_stability_unrest_1:0 "天邪鬼的稳定理解"
 desc_THE_SEJ_positive_stability_unrest_1:0 "反逆邦联并不把安稳当成沉默。每有一点正稳定，都会额外带来一点全局叛乱度；稳定度不高于零时没有额外效果。"
 THE_SEJ_positive_stability_unrest_2:0 "天邪鬼的稳定理解"
 desc_THE_SEJ_positive_stability_unrest_2:0 "反逆邦联并不把安稳当成沉默。每有一点正稳定，都会额外带来一点全局叛乱度；稳定度不高于零时没有额外效果。"
