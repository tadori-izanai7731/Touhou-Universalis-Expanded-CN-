### RELIGION
 THE_Seija_religion: "翻转构想"
 THE_Seija_religion_religion_desc: "天邪鬼并不企图推翻现状并重建全新的秩序，只是渴望翻转一切过程中的乐趣，始于欺骗的弱者乐园构想终究会被现实揭穿。"
