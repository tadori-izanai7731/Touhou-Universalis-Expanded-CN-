 THE_SEJ_constrain_downfall_guard_1_desc:0 "卫队受到的魔力的心智侵蚀已经极为严重，必须立刻整肃军纪，否则他们无差别的攻击会毁了整个下克上。"
 THE_SEJ_constrain_downfall_guard_2_title:0 "强硬手段约束卫队"
 THE_SEJ_constrain_downfall_guard_2_desc:0 "必须加大整肃力度，才能消除这些万宝槌中的侵蚀魔力对卫队成员的负面影响。"
 THE_SEJ_constrain_downfall_guard_3_title:0 "强硬手段约束卫队"
 THE_SEJ_constrain_downfall_guard_3_desc:0 "想要彻底根治疯狂的卫队，就必须把那些彻底无可救药的成员清除出去，再重新用温和的信仰力量来取代狂暴的魔力。"
 THE_SEJ_downfall_guard_no_rebel_crisis_tt:0 "国内没有叛军军队，且没有省份被叛军控制。"
 THE_SEJ_constrain_downfall_guard_1_tt:0 "§R下克上卫队叛军§!将在首都发动第一波反抗，并至多在§Y2§!个受控非首都省份出现支援叛军。"
 THE_SEJ_constrain_downfall_guard_2_tt:0 "§R下克上卫队叛军§!将在首都发动第二波反抗，并至多在§Y3§!个受控非首都省份出现支援叛军。"
 THE_SEJ_constrain_downfall_guard_3_tt:0 "§R下克上卫队叛军§!将在首都发动最终反抗，并至多在§Y3§!个受控非首都省份出现支援叛军。"
