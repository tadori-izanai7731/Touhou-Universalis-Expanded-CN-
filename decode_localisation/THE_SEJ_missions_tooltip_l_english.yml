 THE_SEJ_p1_expansion_flip_colonial_symbol_effect_tt:0 "消耗§Y15§!点魔力充能，将§Y巴伊亚的萨尔瓦多城§!翻转为§Y巴伊亚的天邪鬼城§!，并保留当前伟大工程等级。"
