 mechanic_enables_estate_sej_downfall_guard:0 "启用§Y下克上卫队§!阶级。"
 THE_SEJ_downfall_guard_arrow_banner_privilege:0 "红黑动员令"
 THE_SEJ_downfall_guard_arrow_banner_privilege_desc:0 "允许下克上卫队以红黑旗帜征集兵源，并将其忠诚均衡点提高5%。"
 THE_SEJ_downfall_guard_inverted_judgement_privilege:0 "倒置裁断权"
 THE_SEJ_downfall_guard_inverted_judgement_privilege_desc:0 "让卫队参与裁断旧贵族与地方强人的纠纷。"
 THE_SEJ_downfall_guard_grain_right_privilege:0 "卫队分粮权"
 THE_SEJ_downfall_guard_grain_right_privilege_desc:0 "为卫队保留一部分军粮与补给权，要求他们公开承担守卫责任。"
 THE_SEJ_downfall_guard_nobility_primacy_privilege:0 "从卫队中选拔武装巫女"
 THE_SEJ_downfall_guard_nobility_primacy_privilege_desc:0 "既然正邪的力量越来越多的源自人们对正邪的信仰，那么建立下克上信仰体系的武装巫女就是有必要的。这些来自直接接受魔力强化的正邪亲兵的巫女，将成为正邪意志的执行人。"
 THE_SEJ_p1_5_downfall_guard_appointed_captains_privilege:0 "来自弱者的将军"
 THE_SEJ_p1_5_downfall_guard_appointed_captains_privilege_desc:0 "在正邪对下克上的号召之下，卫队将领不再遵循落后的尊卑次序，即使是新人与弱者也会有证明自己的机会。"
 THE_SEJ_p1_5_downfall_guard_merit_recruitment_privilege:0 "卫队军功制度"
THE_SEJ_p1_5_downfall_guard_merit_recruitment_privilege_desc:0 "在一定程度上允许下克上卫队的特权将可以增强其作战能力。革命卫队步兵作战能力随卫队领地所有权线性提高：拥有20%领地时提高4%。"
 THE_SEJ_p1_5_downfall_guard_professional_guard_privilege:0 "职业卫队"
THE_SEJ_p1_5_downfall_guard_professional_guard_privilege_desc:0 "通过制度化的训练和成熟的魔力强化流程，卫队不再是临时征募的普通人，而是真正强大的军事力量。"
 THE_SEJ_p1_5_downfall_guard_professional_guard_modifier:0 "职业革命卫队"
 THE_SEJ_p1_5_downfall_guard_professional_guard_modifier_desc:0 "仅影响革命卫队。下克上卫队以更稳定的轮值和补给制度维持训练。"
 desc_THE_SEJ_p1_5_downfall_guard_professional_guard_modifier:0 "仅影响革命卫队。下克上卫队以更稳定的轮值和补给制度维持训练。"
 THE_SEJ_p1_5_downfall_guard_oath_discipline_privilege:0 "卫队传播反逆思潮"
THE_SEJ_p1_5_downfall_guard_oath_discipline_privilege_desc:0 "下克上卫队并不能像真正的巫女那样让人们信仰正邪，但他们的传播效果却可以让邦联变得更加“天邪鬼”\n效果随卫队领地份额线性变化：领地份额为0时无效果，达到100%时全局叛乱度增加3。"
 THE_SEJ_p1_5_downfall_guard_standardized_pay_privilege:0 "标准化军饷"
 THE_SEJ_p1_5_downfall_guard_standardized_pay_privilege_desc:0 "为卫队建立严格的军饷制度，可以进一步激发成员们的战斗意志，也可以减小他们成为欺压弱者之人的可能性。"
THE_SEJ_p1_5_downfall_guard_draconic_training_privilege:0 "狂暴作战模式"
 THE_SEJ_p1_5_downfall_guard_draconic_training_privilege_desc:0 "我们放宽卫队的征募与训练约束，让他们拥有狂暴的作战风格，这样就可以和正邪的力量共鸣，回收一定的魔力。\n仅影响革命卫队：所受火力与冲击伤害各提高10%，并使魔力充能每年增加1。不能与「严格卫队征募」同时授予。"
THE_SEJ_p1_5_downfall_guard_draconic_training_modifier:0 "狂暴革命卫队"
THE_SEJ_p1_5_downfall_guard_draconic_training_modifier_desc:0 "仅影响革命卫队。所受火力伤害和冲击伤害各提高10%。"
desc_THE_SEJ_p1_5_downfall_guard_draconic_training_modifier:0 "仅影响革命卫队。所受火力伤害和冲击伤害各提高10%。"
 THE_SEJ_p1_5_downfall_guard_charter_loyalty_privilege:0 "忠于正邪"
 THE_SEJ_p1_5_downfall_guard_charter_loyalty_privilege_desc:0 "下克上卫队为下克上的事业而战，但他们也要保证对正邪的忠诚，卫队的前途与命运都在正邪的一念之间。"
 THE_SEJ_p1_5_downfall_guard_strict_recruitment_privilege:0 "严格卫队征募"
THE_SEJ_p1_5_downfall_guard_strict_recruitment_privilege_desc:0 "通过严格的纪律与征募制度，可以最大限度确保卫队的作战能力。遗憾的是这么做会让卫队变得不那么“天邪鬼”。\n仅影响革命卫队：所受火力与冲击伤害各降低10%，并使魔力充能每年减少1。不能与「狂暴作战模式」同时授予。"
THE_SEJ_p1_5_downfall_guard_strict_recruitment_modifier:0 "严格征募的革命卫队"
 THE_SEJ_p1_5_downfall_guard_strict_recruitment_modifier_desc:0 "仅影响革命卫队。所受火力伤害和冲击伤害各降低10%。"
desc_THE_SEJ_p1_5_downfall_guard_strict_recruitment_modifier:0 "仅影响革命卫队。所受火力伤害和冲击伤害各降低10%。"
 THE_SEJ_need_downfall_guard_estate_tt:0 "已建立阶级「下克上卫队」。"
ONLY_REVOLUTIONARY_GUARD_MODIFIER:0 "§Y仅影响革命卫队。§!"
THE_SEJ_p1_5_downfall_guard_oath_discipline_effect_tt:0 "卫队领地份额为0时无效果；达到100%时全局叛乱度§R+3§!，中间数值按领地份额线性缩放。"
THE_SEJ_p1_5_downfall_guard_rage_mode_effect_tt:0 "仅影响革命卫队：所受火力伤害和冲击伤害各§R+10%§!；魔力充能每年§G+1§!。"
THE_SEJ_p1_5_downfall_guard_strict_recruitment_effect_tt:0 "仅影响革命卫队：所受火力伤害和冲击伤害各§G-10%§!；魔力充能每年§R-1§!。"
 THE_SEJ_p1_revolution_declaration_modifier:0 "下克上宣言"
 THE_SEJ_p1_revolution_declaration_modifier_desc:0 "察伊琴奇已经经受住信仰冲突与失控卫队的双重考验，正邪的反逆事业准备迈向下一个阶段。"

