 THE_SEJ_country_release_decision_title: "正邪的逃亡"
 THE_SEJ_country_release_decision_desc: "正邪向小碗提出了特别的提议"
 
 flavor_THE_SEJ.1: "正邪的逃亡"
 flavor_THE_SEJ.1.desc: "历经幻想乡众人持续的追捕后，面对着破损的大结界，正邪想到了逃亡方法：“我要去世界上最落后的地方逃脱追捕，顺便掀起一场轰轰烈烈的下克上！”随即她便告别小碗，带上了失去能量的道具，踏上了前往美洲之路"
 flavor_THE_SEJ.1.a: "正邪，你改悔罢"
 flavor_THE_SEJ.1.b: "放心,我天邪鬼会回来的！"

 flavor_THE_SEJ.1000.name: "重燃下克上的火炬"
 flavor_THE_SEJ.1000.desc: "随着下克上斗争在幻想乡的失败，整个幻想乡的旧秩序仿佛都松了口气，满以为挑战已经被克服，一切都将归于正轨。然而，现在看来他们放心得太早了：在完成了初期准备工作后，正邪已经重新高举起下克上的旗帜，立志将整个世界弱者从强者的压迫中解放出来。"

 flavor_THE_SEJ.EVTNAME101: "下克上宣言"
 flavor_THE_SEJ.EVTDESC101: "正邪带着最辉煌的胜利，凯旋的军队，潜能释放的道具，回到了她最忠诚的黑宫。在这里，所有弱者们团结起来，组成了训练有素，士气高昂的军队，他们誓要保卫革命到最后一息。这一切意味着，正邪终于要对外输出革命了，她要让下克上之火冲出美洲，点燃整个世界！"
 flavor_THE_SEJ.EVTOPTA101: "吾名正邪 生来即是天邪鬼！"


 # 此文件不交由 EMT 编辑，集中维护任务 tooltip 与其他全部玩家文本。

 # ---- migrated from THE_SEJ_rework_l_english.yml ----
 THE_SEJ_p1_navy_admirals_from_below_advisor_requirement_tt:0 "雇佣一名技能至少为§Y3§!的§Y海军改革家§!顾问"
 THE_SEJ_p1_m1_prepared_army_modifier:0 "整军备战"
 THE_SEJ_p1_m2_cheating_barrage_modifier:0 "以犯规对不可能的弹幕"
 THE_SEJ_p1_m2_cheating_barrage_guard_modifier:0 "以犯规对不可能的弹幕（革命卫队）"
 THE_SEJ_p1_m2_gain_ten_revolutionary_guards_tt:0 "在首都获得§G10§!队§Y革命卫队§!。"
 THE_SEJ_p1_m3_against_everyone_modifier:0 "与所有人为敌！"
 THE_SEJ_p1_return_gensokyo_exploration_title:0 "幻想乡探索"
 THE_SEJ_p1_return_gensokyo_exploration_desc:0 "想不到吧，我天邪鬼，又回来辣！（归乡线未完待续）"
 THE_SEJ_p1_faith_four_color_dyes_south_american_dyes_tt:0 "此后，我国及殖民领在§Y南美洲§!的§Y丛林§!省份建立殖民地时，有§Y5%§!概率将该省贸易品改为§Y染料§!。"
 THE_SEJ_p1_faith_four_color_farming_fifty_nine_finished_tt:0 "§Y五十九条论纲§!灾难已经结束。"
 THE_SEJ_p1_faith_four_color_farming_grain_tt:0 "贸易品为§Y谷物§!、文化为§Y妖怪§!、宗教为§Y反逆思潮§!的本国核心省份获得永久省份修正§Y四色农法§!，给予本地商品产出§G+0.50§!。"
 THE_SEJ_p0_reconciliation_festival_claims_tt:0 "获得§Y中美洲§!和§Y墨西哥§!地区的永久宣称。"
 THE_SEJ_rework_chichen_itza_title:0 "奇琴伊察的正邪"
 THE_SEJ_rework_chichen_itza_desc:0 "短暂的落脚、误读和集市之后，奇琴伊察终于被写进箭头旗的故事里。正邪并不承认她需要一座圣地；只是这座圣地刚好已经学会倒过来看她。"
 THE_SEJ_rework_maya_misunderstanding_title:0 "玛雅的误解"
 THE_SEJ_rework_maya_misunderstanding_desc:0 "他们把日历倒着读了——嘿，说不定反而是对的。"
 THE_SEJ_rework_city_state_arbitration_title:0 "城邦仲裁"
 THE_SEJ_rework_city_state_arbitration_desc:0 "城邦之间需要一个第三方的声音。据正邪说，她并非自告奋勇——只是恰好出现在那里。"
 THE_SEJ_rework_lake_city_challenge_title:0 "湖上之城"
 THE_SEJ_rework_lake_city_challenge_desc:0 "特诺奇蒂特兰在湖心等待着。"
 THE_SEJ_rework_subversion_returns_title:0 "§R颠覆再临§!"
 THE_SEJ_rework_subversion_returns_desc:0 "湖中城已经落入箭头的影子里。正邪终于可以宣布：这不是第二次起事，只是第一次还没有结束。"
 THE_SEJ_rework_old_stage_echo_title:0 "旧舞台的回响"
 THE_SEJ_rework_old_stage_echo_desc:0 "从远方传来了一丝熟悉的信号。"
 THE_SEJ_rework_letter_to_bowl_title:0 "给小碗的回信"
 THE_SEJ_rework_letter_to_bowl_desc:0 "正邪把信折了三次，改了四次，最后声称那根本不是信。只是有张纸恰好飞向了旧舞台。"
 THE_SEJ_rework_deception_institution_title:0 "欺骗成为制度"
 THE_SEJ_rework_deception_institution_desc:0 "谎言比说谎者活得更久。"
 THE_SEJ_rework_pachacuti_legacy_title:0 "帕查库蒂的伟业"
 THE_SEJ_rework_pachacuti_legacy_desc:0 "安第斯的道路记得撼地者的名字。正邪当然不会承认她被这个故事打动了；她只是认为，把强者摔下山路这件事听起来很有用。"
 THE_SEJ_rework_southern_gold_title:0 "南方黄金与反则圣物"
 THE_SEJ_rework_southern_gold_desc:0 "南方的黄金、矿山与祭坛正在向箭旗下汇流。正邪说这些财富绝不是为了装点她的旗帜，只是旗帜刚好缺一点反光。"
 THE_SEJ_rework_northern_frontier_title:0 "北方边界自己翻过去了"
 THE_SEJ_rework_northern_frontier_desc:0 "当北方边界被画得足够远，所谓边境就会学会自己向外倒退。正邪对此表示欣慰——不，是警惕。"
 THE_SEJ_rework_denied_godhood_title:0 "否认即教义"
 THE_SEJ_rework_denied_godhood_desc:0 "正邪的每一句否认都被当地人当成了教义写进经文。她对此表示强烈抗议——尽管无人理会。"
 THE_SEJ_rework_other_side_sea_title:0 "海的另一边"
 THE_SEJ_rework_other_side_sea_desc:0 "水面尽头一定有什么东西。"
 THE_SEJ_rework_colonizer_shadow_title:0 "殖民者的阴影"
 THE_SEJ_rework_colonizer_shadow_desc:0 "地平线上出现了船——不怀好意的那种。"
 THE_SEJ_rework_arrows_before_fleet_title:0 "舰队之前的箭矢"
 THE_SEJ_rework_arrows_before_fleet_desc:0 "思想传播的速度比任何舰队都快。"
 THE_SEJ_rework_caribbean_arrow_title:0 "加勒比箭头"
 THE_SEJ_rework_caribbean_arrow_desc:0 "箭头被画在码头、桅杆和倒放的海图上。正邪声称这绝不是殖民，只是让殖民者先尝尝被指路的滋味。"
 THE_SEJ_rework_spread_inversion_title:0 "传播反逆的舰队"
 THE_SEJ_rework_spread_inversion_desc:0 "舰队载去的不只是人和货物，还有墙上的箭头、倒唱的歌，以及那些绝不会承认自己在传教的传教士。"
 THE_SEJ_rework_discover_europe_title:0 "发现欧洲"
 THE_SEJ_rework_discover_europe_desc:0 "就是你们从海那边过来的？很好。现在轮到箭头画到你们家门口了。"
 THE_SEJ_rework_naval_preparation_title:0 "海军准备"
 THE_SEJ_rework_naval_preparation_desc:0 "强者的本土在海的另一侧。若要让他们听见弱者的声音，舰队必须先学会比恐惧更快地成形。"
 THE_SEJ_rework_settle_europe_title:0 "定居欧洲"
 THE_SEJ_rework_settle_europe_desc:0 "桥头堡已经钉进旧大陆的木板。正邪宣布这不是定居，只是让海的另一边也有地方贴箭头。"
 THE_SEJ_rework_downfall_declaration_title:0 "下克上宣言"
 THE_SEJ_rework_downfall_declaration_desc:0 "殖民者以为海洋会保护王冠。现在箭头已经越过海面，革命的宣言将在旧大陆和新大陆之间来回回响。"
 THE_SEJ_rework_temporary_judge_title:0 "临时裁判"
 THE_SEJ_rework_temporary_judge_desc:0 "城邦之间的争端需要一个仲裁者。正邪声称她只是临时帮忙，绝没有建立常设裁判机构的意思。"
 THE_SEJ_rework_miracle_denied_title:0 "被否定的奇迹"
 THE_SEJ_rework_miracle_denied_desc:0 "一个拒绝成为神的存在。正邪反复声明自己不是神——而当地人每次都会把这句也写进经文。"
 THE_SEJ_rework_first_relic_title:0 "第一件逆转遗物"
 THE_SEJ_rework_first_relic_desc:0 "那些旧道具里还有一件藏着火星。"
 THE_SEJ_rework_red_black_idea_title:0 "红与黑的构想"
 THE_SEJ_rework_red_black_idea_desc:0 "红色的箭头，黑色的反话，被祭司和书记官们整理成一套谁也不准说它完整的构想。正邪对此表示满意——不，是不满。"
 THE_SEJ_rework_representatives_title:0 "箭旗下的代表"
 THE_SEJ_rework_representatives_desc:0 "当地人的声音要求在箭旗下被听到。正邪强调她并没有主动邀请任何人——他们自己来的。"
 THE_SEJ_rework_cooperation_org_title:0 "合作机构"
 THE_SEJ_rework_cooperation_org_desc:0 "一个共享治理的框架在各城邦间自然形成。正邪声称整个设计跟她毫无关系。"
 THE_SEJ_rework_union_hall_title:0 "联合议会厅"
 THE_SEJ_rework_union_hall_desc:0 "反权力联合体的会议厅落成了。正邪表示她只是刚好路过——虽然她手上有钥匙。"
 THE_SEJ_rework_first_guard_banner_title:0 "第一面箭矢旗帜"
 THE_SEJ_rework_first_guard_banner_desc:0 "一支卫队——用来让掌权者永远睡不踏实的。"
 THE_SEJ_rework_deny_supremacy_title:0 "否定至高与集权"
 THE_SEJ_rework_deny_supremacy_desc:0 "每个想坐到最高处的人，都会发现椅子已经被锯短了一截。正邪坚称这只是家具设计问题。"
 THE_SEJ_rework_guard_militarization_title:0 "组建卫队"
 THE_SEJ_rework_guard_militarization_desc:0 "箭矢卫队不只是士兵。他们是会走路的标语、会排队的反话，以及让强者不得不认真听弱者说话的噪音。"
 THE_SEJ_rework_events.1.t:0 "坠落于陌生的祭坛旁"
 THE_SEJ_rework_events.1.d:0 "正邪在眩晕中下意识使用的逆转能力让在场的普通人震惊不已，无论这个从天而降的长角生物是什么来头，显然她有着当地人无法想象的力量。而重新站起的正邪迅速理清了现状，她决心利用这个千载难逢的机会，宣称自己是降临的神，并且迅速掌握当地政权。这里就是第二次下克上异变的开始！\n\n§R国家特色§!：由全局叛乱度增幅的魔力充能机制与特色的下克上卫队阶级。\n特色的奇观翻转机制，将强化魔力充能效果并且解锁原住民理念\n击败强力的AI Boss，回收失落的反则道具，解锁特殊的道具机制\n在度过了严酷的灾难之后，反逆邦联将走向带有天邪鬼特色的革命政体，而正邪也将有新的成长。"
 THE_SEJ_rework_events.1.a:0 "等下，我道具怎么丢了好几个？"
 THE_SEJ_rework_events.2.t:0 "余烬将灭"
 THE_SEJ_rework_events.2.d:0 "旧魔力正在消退——在它彻底消亡之前，必须加快脚步。"
 THE_SEJ_rework_events.2.a:0 "必须在它熄灭之前行动。"
 THE_SEJ_rework_events.3.t:0 "我说了我不是神"
 THE_SEJ_rework_events.3.d:0 "他们把我的每一句否认都写进了经文里！"
 THE_SEJ_rework_events.3.a:0 "我不是那个意思！"
