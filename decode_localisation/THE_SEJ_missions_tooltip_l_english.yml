 THE_SEJ_missions_3_1_desc:0 "初临美洲的正邪被当地人误认为神迹。语言不通让她的否认变得毫无用处，而寄宿万宝槌残余魔力的倒语人偶又不断把她的反话翻成箭头旗的宣言。既然误会已经发生，她决定先把第一面箭头旗插稳。"

