 THE_SEJ_internal_test_enter_p1_magic_charge:0 "§R【仅供测试使用】§!切换至P1政体并启用魔力充能"
 THE_SEJ_internal_test_enter_p1_magic_charge_desc:0 "仅供内部测试。立即结束P0阶段并切换至反逆邦联政体，以启用魔力充能界面和相关机制；不会结算诸邦和解大祭的其他奖励与事件效果。"
 THE_SEJ_internal_test_enter_p1_magic_charge_effect_tt:0 "§R内部测试效果：§!立即进入§YP1阶段§!，切换至§Y反逆邦联§!政府改革并启用§Y魔力充能§!。"
 THE_SEJ_internal_test_flip_all_great_projects:0 "§R【仅供测试使用】§!一键翻转全部目标奇观"
 THE_SEJ_internal_test_flip_all_great_projects_desc:0 "仅供内部测试。执行后会逐一翻转目前已拥有且尚未翻转的目标奇观，并保留原有等级；没有符合条件的奇观时不会产生效果。可反复执行。"
 THE_SEJ_internal_test_flip_all_great_projects_effect_tt:0 "§R内部测试效果：§!翻转目前已拥有且尚未翻转的全部目标奇观，并保留各自原有等级。"
 THE_SEJ_restore_flipped_great_projects:0 "刷新反转奇观"
 THE_SEJ_restore_flipped_great_projects_desc:0 "重新翻转已完成翻转任务的奇观：仅补建未正确显示的反转奇观，已正常存在的奇观不会受到影响。"
 THE_SEJ_p1_mayan_spread_centers_explain_decision_title:0 "查看玛雅传播中心"
 THE_SEJ_p1_mayan_spread_centers_explain_decision_desc:0 "查看五十九条论纲灾难中出现的玛雅传播中心及其传播规则。将鼠标悬停在此决议上时，地图会高亮当前由我国控制的玛雅传播中心。"
 THE_SEJ_p1_mayan_spread_center_modifier:0 "玛雅传播中心"
 THE_SEJ_p1_mayan_spread_center_modifier_desc:0 "五十九条论纲的支持者以此地为据点，公然宣称正邪也是要被打到的强者，重建旧祭仪式。他们的行为正在不断造成国内的动荡。"
 desc_THE_SEJ_p1_mayan_spread_center_modifier:0 "五十九条论纲的支持者以此地为据点，重建旧祭仪式并抵制反逆思潮。只有传播中心本身承受本地传教强度惩罚。"
 THE_SEJ_p1_disaster_events.10.t:0 "玛雅传播中心"
 THE_SEJ_p1_disaster_events.10.d:0 "五十九条论纲的支持者已经在两处省份建立玛雅传播中心。传播中心省份会受到§R-3%§!本地传教强度惩罚；由中心传播并改回玛雅宗教的其他省份不会获得这一惩罚。\n\n每两年，只要传播中心存在，就会将一个相邻的反逆思潮省份改回玛雅宗教。重新转化传播中心本身即可摧毁该中心。"
 THE_SEJ_p1_disaster_events.10.a:0 "还真把自己当回事了"

