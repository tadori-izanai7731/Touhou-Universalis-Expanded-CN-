 THE_NIN_ideas_start: "蜃气楼传统"
 THE_NIN_ideas_bonus: "蜃气楼野心"
 THE_NIN_idea_1: "Paradox引擎「Clausewitz」"
 THE_NIN_idea_2: "污秽中的新生"
 THE_NIN_idea_3: "以信为真"
 THE_NIN_idea_4: "信息奇点"
 THE_NIN_idea_5: "维纳斯的新生"
 THE_NIN_idea_6: "覆水难收"
 THE_NIN_idea_7: "真实的秩序"
 THE_NIN_idea_1_desc: "你知道的，没有它这款游戏运行不了，此乃真实！"
 THE_NIN_idea_2_desc: "贝子诞生于信息之海的混沌与涡流，由数据残渣与认知垃圾中所凝结。就如同沙砾侵入蛤内，经年累月方成珍珠，她的存在本身便是从无序与污秽中淬炼出的，意外而纯粹的美。"
 THE_NIN_idea_3_desc: "在广袤信息之海中的真相对我而言本是不可捉摸的迷雾，当足够多的人共同坚信某件事时，那信念本身便会拥有改变现实的分量。"
 THE_NIN_idea_4_desc: "自诞生于混乱无序的信息之海，她比任何人都更清楚这世界的千疮百孔。但这破碎无用的信息，若被重组提炼，也将成为她的力量。"
 THE_NIN_idea_5_desc: "维纳斯啊，维纳斯啊。当您自污浊的泡沫中睁开双眼，请横渡此处余秽。子民不再相信旧日的虚伪与残酷，只愿追随您那升起的光芒。维纳斯啊，维纳斯啊，您是混沌创造的阿佛洛狄忒，请指引我们。瞠见真相，走向您为我们构造的，由爱与美织就的明天。"
 THE_NIN_idea_6_desc: "在信息洪流中辨明虚实早已失去意义。她领悟到，真正的力量源于共同相信。她不再追问何为真实，而是选择去引导、塑造、乃至成为那个被众人众子民笃信的愿景。去相信吧，相信吧，一旦相信，便不再回头——便做到一切覆水难收。"
 THE_NIN_idea_7_desc: "目睹世界的混乱与虚伪，我便就此甦醒。若谎言，若虚假带来的是真实的爱，秩序与和平。那么手段的真伪便不再重要吧。"
###IDEA_END

