###FUJ_TAG
 FUT: "佐渡氏"
 FUT_ADJ: "佐渡氏"
###FUJ_TAG_END

###FUJ_IDEA
 THE_FUT_ideas: "佐渡氏理念"
 THE_FUT_ideas_start: "佐渡氏传统"
 THE_FUT_ideas_bonus: "佐渡氏野心"
 THE_FUT_idea_1: "月出天下白"
 THE_FUT_idea_2: "谣卷千山"
 THE_FUT_idea_3: "杯底有潮声"
 THE_FUT_idea_4: "醉乡忘机，月下独酌"
 THE_FUT_idea_5: "旧友之托"
 THE_FUT_idea_6: "衣冠百代"
 THE_FUT_idea_7: "天地为席月为灯"
 THE_FUT_idea_1_desc: "白昼属于人类与秩序，而月华铺洒的夜晚，则是妖怪的领域。林间、道旁、宴席光影交错处，皆为我等之疆土。不依刀兵，不仗符印，仅依这清辉与美酒。"
 THE_FUT_idea_2_desc: "她的名声建立在无数真伪难辨的传奇之上。每一次成功的戏弄，每一句被夸大传播的大言，都是她权威的基础。恐惧与敬畏，往往比亲近更能塑造一个大妖怪的威仪。"
 THE_FUT_idea_3_desc: "盏中晃荡的，仅仅只是美酒？分明映着四十九里外故乡初融的山野，与再难归去的早春。每饮一口，便把一片佐渡的潮声咽入喉中。"
 THE_FUT_idea_4_desc: "宴席即道场，在此之间，天狗可垂首，神明可拊掌，巫女也暂忘了自己的职责。醉意所至，万般的面目都在此时脱落，只剩下最后的本真————"
 THE_FUT_idea_5_desc: "为了重要的约定或情义，可以跨越视为天堑的波涛。这份对旧友之托的重视，揭示了在她玩世不恭的面具之下，存在着古老而牢固的，属于我等「义理」与执着。"
 THE_FUT_idea_6_desc: "皮囊不过是随时可更换的外衣。今日是云游的僧侣，明日是迷路的商人，从未有固定的形态，亦无不变的真我，变化本身，即是她最恒久的姿态。"
 THE_FUT_idea_7_desc: "最终极的宴席，当以天地为座，明月为灯，四十九里涛声为乐，万古清风为伴。"
###FUJ_IDEA_END

###Q00_TAG
 Q00: "铃奈庵"
 Q00_ADJ: "铃奈庵"
###Q00_TAG_END

###Q00_IDEA
 THE_Q00_ideas: "铃奈庵理念"
 THE_Q00_ideas_start: "铃奈庵传统"
 THE_Q00_ideas_bonus: "铃奈庵野心"
 THE_Q00_idea_1: "万家灯火"
 THE_Q00_idea_2: "倾听风语"
 THE_Q00_idea_3: "离天空更近的地方"
 THE_Q00_idea_4: "未闻之声"
 THE_Q00_idea_5: "SeleQtion"
 THE_Q00_idea_6: "随风而去"
 THE_Q00_idea_7: "未曾知晓的彼方"
 THE_Q00_idea_1_desc: "古旧的书店坐落在人类村落的一角。每日洒扫、整理书册、等待偶尔的访客，是小铃再平凡不过的生活。"
 THE_Q00_idea_2_desc: "她习惯于坐在缘侧，或是在整理书架的间隙，静静地倾听。风声、雨声、远处宴会的喧闹、陌生访客的低语···这一切都是故事的一部分，等待着被编织。"
 THE_Q00_idea_3_desc: "渴望飞翔————这番思绪，想必不存在任何区别吧。如此一来，就一定能飞向 离天空更近的地方————"
 THE_Q00_idea_4_desc: "比起书页上既定的文字，她更在意那些空白处的沉默，那些被作者抹去的犹豫，那些角色未曾说出口的台词。真正的故事，往往存在于未被书写与无法听见之中。"
 THE_Q00_idea_5_desc: "···这样，便可以了吗？Q的真身为谜团所环绕，不为世人所知晓。将Q创造出的「她」的生平，也会在无人知晓中结束。「她」是怎么想的呢？这样就足够了吗？"
 THE_Q00_idea_6_desc: "她深知自己并非故事的主角。故事如风一般流经此地，被短暂记录，然后又将随着新的风，或许是某位借阅者，去往下一个未知的地方吧。"
 THE_Q00_idea_7_desc: "合上书本，故事便结束了。最大的愿望，或并非改写结局或成为英雄，仅仅是希望这「未完待续」的状态能够延续下去···直至在某个未知的彼方。"
###FUJ_IDEA_END

