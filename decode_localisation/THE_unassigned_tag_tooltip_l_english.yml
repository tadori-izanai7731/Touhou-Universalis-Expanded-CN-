 THE_Q00_idea_3: "平凡不过"
 THE_Q00_idea_4: "故事的碎片"
 THE_Q00_idea_5: "离天空更近的地方"
 THE_Q00_idea_6: "随风而去"
 THE_Q00_idea_7: "未曾知晓的彼方"
 THE_Q00_idea_1_desc: "古旧的书店坐落在人类村落的一角。每日洒扫、整理书册、等待偶尔的访客，是小铃再平凡不过的生活。"
 THE_Q00_idea_2_desc: "她习惯于坐在缘侧，或是在整理书架的间隙，静静地倾听。风声、雨声、远处宴会的喧闹、陌生访客的低语···这一切都是故事的一部分，等待着被编织。"
 THE_Q00_idea_3_desc: "在充满非常识存在的世界里，小铃只是再平凡不过的女孩，这"
 THE_Q00_idea_4_desc: ""
 THE_Q00_idea_5_desc: ""
 THE_Q00_idea_6_desc: "她深知自己并非故事的主角，也非知识的创造者。故事与秘密如风一般流经此地，被短暂记录，然后又将随着新的风，或许是某位借阅者，去往下一个未知的地方吧。"
 THE_Q00_idea_7_desc: ""
