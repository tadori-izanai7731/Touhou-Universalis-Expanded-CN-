 THE_MYI_ideas: "鲵吞亭理念"
 THE_MYI_ideas_start: "鲵吞亭传统"
 THE_MYI_ideas_bonus: "鲵吞亭野心"
 THE_MYI_idea_1: "座敷童子的祝福"
 THE_MYI_idea_2: "梦幻酒家"
 THE_MYI_idea_3: "伊吹瓢的倒影"
 THE_MYI_idea_4: "醉生梦死"
 THE_MYI_idea_5: "归家"
 THE_MYI_idea_6: "妖怪鲵吞亭"
 THE_MYI_idea_7: "宁静居所"
 THE_MYI_idea_1_desc: "被座敷童子眷顾的家庭，总会收获些许安宁与小小的幸运。这份祝福如同微弱的烛光，虽然不耀眼，却足以温暖一室。"
 THE_MYI_idea_2_desc: "美酒、佳肴与恰到好处的氛围，让鲵吞亭的生意总是令人满意。薄利多销的经营，为这片酒家提供了稳定的收入。"
 THE_MYI_idea_3_desc: "虽然美宵无法离开屋子，但能够依附在伊吹瓢中参加各地的宴会。"
 THE_MYI_idea_4_desc: "杯盏交错间，昨日的仇怨仿佛也已模糊。在鲵吞亭的屋檐下，总能维系着比外界想象中更多一些的“睦关系，尽管这些记忆可能和昨夜的梦境一样虚幻。"
 THE_MYI_idea_5_desc: "座敷童子渴望归来，也指引迷途者归家。美宵也会帮助醉酒的客人们找到回家的路。"
 THE_MYI_idea_6_desc: "当夜晚降临，真正的宾客到来时，鲵吞亭便会展现出其作为妖怪酒家的本相。如这些为妖怪准备的独特商品与服务。"
 THE_MYI_idea_7_desc: "年复一年，鲵吞亭始终是那个安静的、可供休憩的角落。"
###MYI_IDEA_END

