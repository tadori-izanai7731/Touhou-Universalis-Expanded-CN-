l_english:
 THE_SEJ_p0_restore_old_capital_title:0 "修复旧都"
 THE_SEJ_p0_restore_old_capital_desc:0 "奇琴伊察本地最大的资本并非国力与军队,而是作为旧都的象征。通过对水井、道路等基础设施的修复，可以为天降的正邪带来合法性"

 THE_SEJ_p0_protect_ppolom_title:0 "保护波洛姆"
 THE_SEJ_p0_protect_ppolom_desc:0 ""

 THE_SEJ_p0_east_coast_title:0 "迎日海岸"
 THE_SEJ_p0_east_coast_desc:0 "玛雅东海岸已有繁忙的港口与海贸网络，却分散在不同城邦和商路手中。组织沿岸向导，绘制海岸与航路，把港口、盐场和市集连接起来。"

 THE_SEJ_p0_standard_measures_title:0 "度量衡的统一"
 THE_SEJ_p0_standard_measures_desc:0 "正邪统一了盐、棉布、可可、蜂蜜、玉米、鱼干等物品的计量标准，并禁止贵族任意调节规则。"

 THE_SEJ_p0_inverted_market_title:0 "下克上大市"
 THE_SEJ_p0_inverted_market_desc:0 "每 8 天一市，每 88 天一大市。88无论如何反转都是一样的，这是象征正邪的圣数。商业活动将与正邪的祭祀相结合：每次大市，商人都要向正邪献上88枚可可豆作为祭品"

 THE_SEJ_p0_city_state_cooperation_title:0 "城邦合作机构"
 THE_SEJ_p0_city_state_cooperation_desc:0 "通过在弥合城邦冲突中的不断努力，以及商业的长足发展，正邪得以建立了有效的合作机构以使分散的各部族高效运转"

 THE_SEJ_p0_fallen_arrow_title:0 "坠落的箭头"
 THE_SEJ_p0_fallen_arrow_desc:0 "前所未有的远距离穿越使得正邪的方向控制能力几乎失灵，她一头冲向了奇琴伊察的石阶，坐在了两顶显眼的羽毛头冠上。而周围的祭祀声也在一瞬间凝固。"

 THE_SEJ_p0_reconciliation_festival_title:0 "诸邦和解大祭"
 THE_SEJ_p0_reconciliation_festival_desc:0 "正邪对国内的统治已经站稳，玛雅潘诸邦也越来越愿意承认正邪的权威。接下来，她以宗教号令为名，将愿意合作的诸邦首领聚集在奇琴伊察，观看一场“盛大的演出”。同时，她也准备好激发道具中远超以往的侵蚀魔力。至于代价，天邪鬼大人决定等赢完再说。"

 THE_SEJ_p0_divine_power_title:0 "神力展示"
 THE_SEJ_p0_divine_power_desc:0 "考虑到自己势单力孤，正邪打算先通过道具中残留的侵蚀性魔力，以及一些小小的神力展示，以此可以干扰祭司的判断力，建立对自己有利的信条融入当地信仰体系，最大程度减小阻力。\n即使那些敌意的城邦，在我们的力量面前也不得不屈服。"

 THE_SEJ_p0_downfall_scripture_title:0 "下克上圣典"
 THE_SEJ_p0_downfall_scripture_desc:0 "她接受了神圣王与太阳祭司的血祭，从天上降临。她为强者的血而喜悦。她为弱者的服务而喜悦。黄玉米是她手上的金环，象征太阳与丰收。红白黑则是她的衣物与头发：白玉米对应石灰、祭文与弱者光明的未来。红玉米对应血誓、战旗与强者必须偿还的代价。黑玉米对应夜路、石影与天邪鬼的反骨。"

 THE_SEJ_p0_priest_school_title:0 "正邪为弱者的服务而喜悦"
 THE_SEJ_p0_priest_school_desc:0 "正邪着力建立新的祭司学校，着重培养低级祭司子弟、被旧祭司排挤的人、忠诚贵族的次子、平民聪明儿童以取代旧祭司家族，扶持有利于自己的信仰体系。同时，祭司学校也承担着移风易俗工作：虽然正邪可以对部分行为睁一只眼闭一只眼，但血腥祭祀的习俗还是太让正邪不适"

 THE_SEJ_p0_inverted_tribunal_title:0 "下克上裁判所"
 THE_SEJ_p0_inverted_tribunal_desc:0 "保留地方祭司，统一最高解释权，所有重大祭祀、播种历、战争占卜、灾荒仪式，都必须由下克上裁判所确认。同时裁判所也肩负着快速传播反逆思潮的重任。"

 THE_SEJ_p0_join_downfall_title:0 "来吧人类，加入下克上吧！"
 THE_SEJ_p0_join_downfall_desc:0 "正邪从来不是独行侠，她一直致力于拉拢对下克上有帮助的人，即使那些人是强者。以红黑色箭头为象征的卫队，将从小贵族次子、受旧贵族压迫的自由民、孤儿、优秀的猎人与护卫中招募：他们的前途只来自于正邪"

 THE_SEJ_p0_red_black_principles_title:0 "红与黑的组织原则"
 THE_SEJ_p0_red_black_principles_desc:0 "红与黑，这是正邪的裙摆，也是她的力量。组织严密、待遇丰厚的红黑卫队将是正邪最得力的臂膀"

 THE_SEJ_p0_absorb_old_noble_supporters_title:0 "吸纳旧贵族支持者"
 THE_SEJ_p0_absorb_old_noble_supporters_desc:0 "对于旧贵族中可合作的人，正邪也不吝惜恩典。道具中残余的侵蚀性魔力足以影响人们的判断，即使是强者，也是她拉拢的对象。"

 THE_SEJ_p0_bloody_purge_nobles_title:0 "正邪为强者的血而喜悦"
 THE_SEJ_p0_bloody_purge_nobles_desc:0 "正邪在愤怒！只有最强大的贵族的血才能让她重回平静"

 THE_SEJ_p1_expansion_panama_gap_title:0 "连接两大洋的隙间"
 THE_SEJ_p1_expansion_panama_gap_desc:0 "在控制了巴拿马以后，正邪得以动用神奇的隙间折叠伞，来临时开辟一条沟通两大洋的通道"

 THE_SEJ_p1_expansion_desert_march_title:0 "向着沙漠前进"
 THE_SEJ_p1_expansion_desert_march_desc:0 "越过平原与河谷之后，在开阔而沉默的沙地与峡谷之间，正邪找到了另一批失落道具的位置。纵使居住在沙海中的游牧民凶猛而善战，他们也无法阻挡下克上的脚步"

 THE_SEJ_p1_expansion_navajo_reversal_title:0 "纳瓦霍的翻转"
 THE_SEJ_p1_expansion_navajo_reversal_desc:0 "被嵌入悬崖之中的梅萨维德的聚落，是纳瓦霍人不屈服于环境的顽强创造。正邪从这些顽强求生的普通人身上看到了下克上精神。而此地的翻转也将是下克上事业推进到西海岸的象征。"

 THE_SEJ_p1_expansion_black_palace_title:0 "黑宫"
 THE_SEJ_p1_expansion_black_palace_desc:0 "在完成了北美洲的道具回收与奇观翻转工作以后，东海岸的一处原野吸引了正邪的注意，她决定用魔力在这里兴建起一座配得上自己伟大事业的建筑。"

 THE_SEJ_p1_navy_unknown_lands_title:0 "驶向未知之地"
 THE_SEJ_p1_navy_unknown_lands_desc:0 "正邪从未忘记反攻幻想乡的目标。广袤的未知海域，阻挡不了她归乡的路。"

 THE_SEJ_p1_navy_caribbean_supply_title:0 "不许偷我的钱"
 THE_SEJ_p1_navy_caribbean_supply_desc:0 "正邪深深愤怒于美洲驴一样的贸易路线，殖民者们只需要躺着，就能从加勒比源源不断地攫取美洲财富。必须掌握加勒比，才能打断这些殖民者偷钱的手。"

 THE_SEJ_p1_trade_cocoa_road_title:0 "修建可可之路"
 THE_SEJ_p1_trade_cocoa_road_desc:0 "玛雅地区资源分布不均。北尤卡坦有盐、棉布、蜂蜜、蜂蜡；东海岸有海贸、鱼干、贝壳、港口；内陆有粮食；高地有黑曜石、玉石和其他贵重资源。因此玛雅共同市场的建立是未来统一玛雅的基础。目前的商路扩建工作仍然局限于本地城邦，但很快它就会普及到整个玛雅"

 THE_SEJ_p1_faith_four_color_dyes_title:0 "四色的染料"
 THE_SEJ_p1_faith_four_color_dyes_desc:0 "人们对正邪的信仰带来了大量的染料需求，寺庙和卫队的大量采购为尤卡坦地区本就丰富的棉花种植和染料工业带来了蓬勃发展"

 THE_SEJ_p1_faith_four_color_farming_title:0 "四色农法"
 THE_SEJ_p1_faith_four_color_farming_desc:0 "通过三级粮仓、公田分配和三姐妹混种的制度安排，农产不仅满足生计，也成为信仰与制度教育的载体。而四色的玉米也和正邪的神力结合，将农法融于信仰之中，也强化了人们对反逆思潮的认同。"

 THE_SEJ_p1_disaster_fifty_nine_theses_title:0 "五十九条论纲"
 THE_SEJ_p1_disaster_fifty_nine_theses_desc:0 "领域内日渐滋生的动荡情绪，终于在祭历院爆发：一位教士和信奉玛雅宗教的前教士团体联合，在祭历院的外墙公开宣称正邪也是强者的一份子，是窃取了玛雅宗教信仰的异端，并要求将正邪驱逐出玛雅信仰体系。真是不懂感恩的杂鱼，看我派卫队来把你们送上天！"

 THE_SEJ_p1_disaster_power_reversal_title:0 "强弱的永恒变换"
 THE_SEJ_p1_disaster_power_reversal_desc:0 "经历了反复的宗教冲突与镇压，并且彻底扫清了旧玛雅神系的支持者之后，正邪已不再单纯只为下克上的字面含义而感到喜悦，而是对强者与弱者有了新的理解：强弱无常，随时翻转。反逆思潮也终于从旧有的玛雅神系中脱离，彻底成为了以正邪为核心的新信仰。"

 THE_SEJ_p1_power_title:0 "可控阴阳玉"
 THE_SEJ_p1_power_desc:0 "正版的渴血阴阳玉交给普通人太过危险，但是我们可以批量仿制一批可控阴阳玉，实现快速招募卫队的效果"

 THE_SEJ_p1_expansion_cahokia_title:0 "僧侣丘下的聚落"
 THE_SEJ_p1_expansion_cahokia_desc:0 "卡霍基亚没有留下像阿兹特克、印加那样可被明确命名的王朝、君主和文字记录，却组织起了以僧侣丘为中心的墨西哥以北最大的前哥伦布时期聚落。玉米、贝壳、铜器、石材着河流和道路移动，使密西西比的人们在没有统一帝国的情况下仍然彼此相连。这里也将成为正邪治下沟通东西海岸的重要枢纽。"

 THE_SEJ_p1_expansion_cherokee_title:0 "征服穴居之国"
 THE_SEJ_p1_expansion_cherokee_desc:0 "居住在山区与洞穴中的切罗基人有着不凡的心，但他们也有了不该拥有的反则道具。在肯定了他们的下克上精神之后，正邪也毫不留情的将道具回收，挥师东进，将下克上推广至东海岸。"

 THE_SEJ_p1_navy_found_downfall_navy_title:0 "建立下克上海军"
 THE_SEJ_p1_navy_found_downfall_navy_desc:0 "独木舟承载不了正邪的理想，也无法抗衡殖民者的威胁。想要让下克上的事业走向世界，就必须要一支真正的海军。"

 THE_SEJ_p1_navy_admirals_from_below_title:0 "提督不分出身"
 THE_SEJ_p1_navy_admirals_from_below_desc:0 "倡导平等与自由的下克上社会，为底层水手们提供了宽阔的上升渠道，出身卑微的水手甚至是奴隶也能成为船长与提督。这让下克上海军将星辈出，成为下克上事业的一大支柱。"
 THE_SEJ_p1_navy_admirals_from_below_advisor_requirement_tt:0 "雇佣一名技能至少为§Y3§!的§Y海军改革家§!顾问"

 THE_SEJ_p1_navy_fleet_for_weak_title:0 "为弱者而战的舰队"
 THE_SEJ_p1_navy_fleet_for_weak_desc:0 "下克上海军已经从最初的独木舟，壮大到到现在旌旗蔽空、舳舻千里的庞大舰队。敌军在我们面前，将不得不以一敌三。就让这些强者在下克上的海军面前颤抖吧"

 THE_SEJ_p1_city_chichen_workshop_title:0 "察伊琴奇工坊"
 THE_SEJ_p1_city_chichen_workshop_desc:0 "作为玛雅旧都与如今反逆邦联的首都，察伊琴奇得到了长足发展。我们要鼓励这种繁荣，使察伊琴奇成为中美洲的明珠。"

 THE_SEJ_p1_disaster_item_rampage_start_title:0 "天邪鬼掀起下克上"
 THE_SEJ_p1_disaster_item_rampage_start_desc:0 "随着玛雅的统一，人们对下克上的信仰使魔力增幅到了前所未有的强度，正邪也趁机制定着进一步向世界扩散下克上的计划。然而沉浸在美妙力量中的她并没有注意到，魔力也在让领域中的人们变得愈发暴躁与嗜血"

 THE_SEJ_p1_disaster_weak_wish_title:0 "弱者的愿望"
 THE_SEJ_p1_disaster_weak_wish_desc:0 "人们对下克上与正邪的信仰不止为正邪提供了强大的力量来源，也在暗中塑造者正邪。弱者们对平等与自由的愿望，也在慢慢变成正邪自己的愿望。反逆思潮也在逐渐摆脱玛雅神系的残余，形成了以正邪为核心的新信仰。"

 THE_SEJ_p1_disaster_shaped_amanojaku_title:0 "被下克上塑造的天邪鬼"
 THE_SEJ_p1_disaster_shaped_amanojaku_desc:0 "历经了多年的动乱与冲突，正邪也被多年的经历与人们的信仰悄悄改变。在不知不觉间，她已经会真心为弱者们的愿望而战，而不是执着于下克上的字面含义。"

 THE_SEJ_p1_revolution_declaration_title:0 "§R下克上宣言§!"
 THE_SEJ_p1_revolution_declaration_desc:0 "既然你们的愿望是自由与平等，天邪鬼大人也会为了你们的愿望而战。将下克上的理想传遍全世界吧！"

 THE_SEJ_p1_expansion_lost_items_title:0 "这份力量不属于你们"
 THE_SEJ_p1_expansion_lost_items_desc:0 "在察伊琴奇的共鸣之后，正邪已经确认了失落道具的位置。这些道具中逸散的魔力不仅强大，还具有着蛊惑人心的力量，必须尽快回收，否则将成大患。"

 THE_SEJ_p1_expansion_aztec_item_recovery_title:0 "阿兹特克道具回收"
 THE_SEJ_p1_expansion_aztec_item_recovery_desc:0 "历经不断的冲突，正邪终于从蒙特祖玛手中回收了第一批道具。迫在眉睫的失落道具威胁已经结束，阿兹特克人与玛雅人也将在同一面旗帜下为下克上的事业而战。"

 THE_SEJ_p1_expansion_flip_tenochtitlan_title:0 "翻转特诺奇蒂特兰"
 THE_SEJ_p1_expansion_flip_tenochtitlan_desc:0 "特诺奇蒂特兰，特斯科科湖上的明珠，它的翻转将会成为下克上事业向着世界扩散的新起点。"

 THE_SEJ_p1_expansion_ultimate_reversal_title:0 "究极反则生物"
 THE_SEJ_p1_expansion_ultimate_reversal_desc:0 "从察伊琴奇出发，越过雨林、湖泊、河谷、荒漠与雪山。两座大陆广袤的领地与文化，都被纳入同一面黑与红的旗帜。究极反则生物的名号已经响彻两座大陆、两座大洋。"

 THE_SEJ_p1_navy_red_black_ocean_title:0 "红黑色的大洋"
 THE_SEJ_p1_navy_red_black_ocean_desc:0 "即使是龙宫的天人，又何曾见过如此庞大、具有实力的强大舰队。如今，黑红色的旗帜飘荡在两座大洋之上，他们将会把下克上的事业带向世界每一处海岸。"

 THE_SEJ_p1_disaster_bloodthirsty_guard_title:0 "失控的嗜血卫队"
 THE_SEJ_p1_disaster_bloodthirsty_guard_desc:0 "作为正邪的左膀右臂，下克上卫队遭受了最严重的魔力侵蚀，成员们前所未有的失控与嗜血。虽然卫队并没有公开反对正邪，但也大量出现了无差别的攻击所有人的现象。卫队必须被约束。"

 THE_SEJ_p1_disaster_faith_replaces_magic_title:0 "用信仰的力量取代侵蚀魔力"
 THE_SEJ_p1_disaster_faith_replaces_magic_desc:0 "想要彻底解决卫队的失控问题，就必须对魔力来源做出调整，从辉针城异变开始就在依赖的万宝槌的侵蚀魔力必须被替换。正邪决心将魔力供给转向人们的信仰之力。"

 THE_SEJ_p1_expansion_speed_title:0 "超级天狗"
 THE_SEJ_p1_expansion_speed_desc:0 "我们可以使用玩具相机的力量来幻化出一位模拟天狗，让她来带着我们的军队在广袤的美洲大陆上高速驰骋。"

 THE_SEJ_p1_expansion_chan_chan_title:0 "昌昌？好名字"
 THE_SEJ_p1_expansion_chan_chan_desc:0 "昌昌是奇穆王国的都城。奇穆人用泥与渠在干燥的秘鲁北海岸上修建起了庞大的海岸城市。虽然其中森严的多层泥墙让正邪感到不悦，但它的名字很让正邪感到欣喜：怎么转都一样"

 THE_SEJ_p1_expansion_flip_colonial_symbol_title:0 "翻转殖民象征"
 THE_SEJ_p1_expansion_flip_colonial_symbol_desc:0 "巴伊亚的萨尔瓦多城是欧洲殖民者在南美的重要城市，将这座殖民之城彻底翻转标志着下克上事业终于横跨南美东西两岸，也将大大激励人们的反抗意志。"

 THE_SEJ_p1_ideas_feudal_records_title:0 "接纳建封思想"
 THE_SEJ_p1_ideas_feudal_records_desc:0 "为了改造美洲原始的社会风俗，必须先从封建开始，但封建思想处处都带有着强者对弱者的压迫。只要我们推广的不是封建思潮，而是建封思潮，问题不就解决了吗？天邪鬼大人真是天才。"

 THE_SEJ_p1_ideas_renaissance_spread_title:0 "辉煌文艺的普及"
 THE_SEJ_p1_ideas_renaissance_spread_desc:0 "强者总是让天邪鬼感到讨厌，但正邪却很欣赏他们对艺术的支持。崭新的文化运动是对旧枷锁的冲击，也将成为改造玛雅社会血腥风俗的有利工具。"

 THE_SEJ_p1_ideas_worldward_push_title:0 "向世界推进"
 THE_SEJ_p1_ideas_worldward_push_desc:0 "下克上的事业不能在美洲止步。如果我们有着推翻强者的理想，就要具有勇于探索边界的精神。不将眼光局限于美洲大陆，而是向着更远的远方推进。"

 THE_SEJ_p1_gun_title:0 "四尺雷电棒棒"
 THE_SEJ_p1_gun_desc:0 "印加人们参考四尺魔法炸弹设计出了奇怪但好用的雷电棒棒。虽然目前阶段让所有普通士兵直接持有道具太过危险，但我们可以吸收设计经验来强化我们的炮兵力量。"

 THE_SEJ_p1_expansion_island_frontier_title:0 "海岛前线"
 THE_SEJ_p1_expansion_island_frontier_desc:0 "美洲的贸易财富正在源源不断的从加勒比群岛流向欧洲。想要制止这种对弱者的欺压，就必须掌握加勒比的贸易。这里也会成为对抗殖民者的前线。"

 THE_SEJ_p1_expansion_face_pachacuti_title:0 "直面大地撼动者"
 THE_SEJ_p1_expansion_face_pachacuti_desc:0 "下一批反则道具流落到了印加的帕查库蒂手中，他奇迹般的以弱胜强的传说在印加广为流传。这传说也让正邪热血沸腾：直面强者是正邪最爱的对抗。"

 THE_SEJ_p1_expansion_potosi_wealth_title:0 "波托西的财富"
 THE_SEJ_p1_expansion_potosi_wealth_desc:0 "波托西的富饶山，在另一个世界，这里被誉为16世纪世界最大的工业复合体，但它只是一座充满血泪与掠夺的罪恶之地。正邪将用自己的魔力开发埋藏其中的财富，让财富变成下克上的燃料。"

 THE_SEJ_p1_ideas_enlightenment_vanguard_title:0 "启蒙先锋"
 THE_SEJ_p1_ideas_enlightenment_vanguard_desc:0 "歌颂理性、反对愚昧与专制的启蒙思想与正邪不谋而合。她非常乐意为这些受到压迫的思想家们展现宽容与提供庇护。"

 THE_SEJ_p1_m1_title:0 "整军备战"
 THE_SEJ_p1_m1_desc:0 "得到了反则道具力量的阿兹特克人已经成长为了不容忽视的威胁，我们必须为强敌的到来做好准备"

 THE_SEJ_p1_m2_title:0 "以犯规对不可能的弹幕"
 THE_SEJ_p1_m2_desc:0 "面对犯规之人，天邪鬼也有着犯规的对策。释放魔力，不必和他们讲仁慈！"

 THE_SEJ_p1_m3_title:0 "与所有人为敌！"
 THE_SEJ_p1_m3_desc:0 "被反则道具增幅的当地人也好，来自欧洲的殖民者也好，天邪鬼早就做好了面对完全包围网的准备。"