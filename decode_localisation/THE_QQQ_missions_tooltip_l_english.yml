 THE_QQQ_idea_3: "离天空更近的地方"
 THE_QQQ_idea_4: "被遗忘的名字"
 THE_QQQ_idea_5: "虚幻之友"
 THE_QQQ_idea_6: "The Music I Hate"
 THE_QQQ_idea_7: "被遗忘的故事"
 THE_QQQ_idea_1_desc: "夜光蝶的微光，静静地闪烁着，仿佛有谁在编织着转瞬即逝的梦。珍藏起所有的一切，一个都不会落下。"
 THE_QQQ_idea_2_desc: "深更寻夜夜更深，寻不见，失落的记忆，身犹颤，空余恨。此情虽已，成为追忆却不在，这千言与万语之间。"
 THE_QQQ_idea_3_desc: "无力飞翔————我们没有任何，探索那片天空的方法。尽管如此，你还是像这样 对我倾诉着渴望————"
 THE_QQQ_idea_4_desc: "记忆依托着歌谣 在走过的每一个地方，延续——没有人知道它的含义——有一天——要将留下来的名字——托付给明天——那一天还很遥远。"
 THE_QQQ_idea_5_desc: "幻想的友人是Q自己的友人吗，又或是犯人的妄想吗···孩童有时往往会「人为地删去选项，钻入他们深信的狭隘思考之中」。"
 THE_QQQ_idea_6_desc: "人们啊，继续歌唱，勾勒你们的思绪吧。只是「我」在今后的人生里，再也不想去理解任何···这，令我憎恶的，音乐（声音）。"
 THE_QQQ_idea_7_desc: "不可能永远驻留···于是为了新的相遇，就如名为「爱」的一个词的蕴意···让你被忘记。让你的故事···一直渴望能了解「心」（你）···总是任由自己被遗忘的回忆（思绪）。还请让我怀着名为「爱」的一个词···将「旋律」（你）彻底忘记。"
